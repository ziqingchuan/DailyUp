name: Keep Supabase Database Alive

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2点，北京时间 10点
  workflow_dispatch:     # 允许手动触发

jobs:
  keep-supabase-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Supabase JS
        run: npm install @supabase/supabase-js

      - name: Insert keepalive record
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cat > package.json << EOF
          { "type": "module" }
          EOF

          cat > keepalive.js << EOF
          import { createClient } from '@supabase/supabase-js'

          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_ANON_KEY
          )

          try {
            // 每天往保活表插入一条数据（真正激活数据库）
            const { error } = await supabase
              .from('database_keepalive')
              .insert([{}])

            if (error) throw error

            console.log('✅ Supabase 保活成功：已插入一条记录')
            console.log('⏰ 执行时间：' + new Date().toLocaleString('zh-CN'))
          } catch (err) {
            console.error('❌ 保活失败：', err)
            process.exit(1)
          }
          EOF

          node keepalive.js

      # 保持 GitHub Action 不被冻结（自动更新时间戳文件）
      - name: Update GitHub activity
        run: |
          date -u > .last_keepalive.txt
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add .last_keepalive.txt
          git diff --quiet || git commit -m "chore: update keepalive timestamp [skip ci]"
          git push
