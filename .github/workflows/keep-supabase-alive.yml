name: Keep Supabase Database Alive

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2点 / 北京时间 10点
  workflow_dispatch:     # 允许手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull latest code to avoid conflict
      run: git pull --rebase origin main

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    # 关键修复：同时安装 supabase-js 和 ws
    - name: Install dependencies
      run: npm install @supabase/supabase-js ws

    - name: Insert keepalive record to Supabase
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        cat > package.json << 'EOF'
        {
          "type": "module"
        }
        EOF
        cat > keep-alive.js << 'EOF'
        import { createClient } from '@supabase/supabase-js'
        import ws from 'ws'  // 关键修复：引入 ws

        const supabaseUrl = process.env.VITE_SUPABASE_URL
        const supabaseAnonKey = process.env.VITE_SUPABASE_ANON_KEY

        if (!supabaseUrl || !supabaseAnonKey) {
          console.error('❌ 缺少环境变量')
          process.exit(1)
        }

        // 关键修复：添加 transport: ws
        const supabase = createClient(supabaseUrl, supabaseAnonKey, {
          realtime: { transport: ws }
        })

        async function run() {
          try {
            console.log('🔄 正在向保活表插入一条记录...')
            
            const { error } = await supabase
              .from('database_keepalive')
              .insert([{}])

            if (error) throw error
            console.log('✅ Supabase 保活成功：已插入记录')
            console.log('⏰ 执行时间：' + new Date().toLocaleString('zh-CN'))
          } catch (err) {
            console.error('❌ 保活失败：', err)
            process.exit(1)
          }
        }

        run()
        EOF
        node keep-alive.js

    - name: Update timestamp to keep repo active
      run: |
        echo "Last run: $(date -u)" > .supabase-keep-alive.txt
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .supabase-keep-alive.txt
        git diff --quiet || git commit -m "chore: update keepalive timestamp [skip ci]"
        git push
