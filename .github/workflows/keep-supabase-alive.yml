name: Keep Supabase Database Alive

on:
  schedule:
    # 每天北京时间上午10点执行 (UTC 02:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

# 全局环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull latest code
      run: git pull --rebase origin main

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    - name: Install Supabase client
      run: npm install @supabase/supabase-js

    - name: Keep Supabase alive
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        cat > package.json << 'EOF'
        {
          "type": "module"
        }
        EOF

        cat > keep-alive.js << 'EOF'
        import { createClient } from '@supabase/supabase-js'
        const supabaseUrl = process.env.VITE_SUPABASE_URL
        const supabaseAnonKey = process.env.VITE_SUPABASE_ANON_KEY

        if (!supabaseUrl || !supabaseAnonKey) {
          console.error('❌ 缺少 Supabase 环境变量')
          process.exit(1)
        }

        const supabase = createClient(supabaseUrl, supabaseAnonKey)

        async function keepAlive() {
          try {
            console.log('🔄 开始执行 Supabase 保活任务...')
            
            const { error, count } = await supabase
              .from('reports')
              .select('id', { count: 'exact', head: true })

            if (error) {
              console.error('❌ 查询失败:', error.message)
              process.exit(1)
            }

            console.log(`✅ 保活成功! 记录数: ${count || 0}`)
            console.log(`⏰ 执行时间: ${new Date().toLocaleString('zh-CN')}`)
          } catch (err) {
            console.error('❌ 任务失败:', err)
            process.exit(1)
          }
        }

        keepAlive()
        EOF

        node keep-alive.js

    - name: Keep repository active
      run: |
        echo "Last keep-alive run: $(date -u)" > .supabase-keep-alive.txt
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .supabase-keep-alive.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update supabase keep-alive timestamp [skip ci]"
        git push
